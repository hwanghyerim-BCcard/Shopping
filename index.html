<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쇼핑몰 최적화 카드 추천 스캐너</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>쇼핑몰별 BC 바로카드 추천 랭킹</h1>
        </header>

        <nav class="tabs-container">
            <button class="scroll-btn left" aria-label="이전 탭">&lt;</button>
            <div class="tabs-wrapper">
                <ul class="tabs-list" id="tabsList">
                    <!-- Tabs rendered dynamically -->
                </ul>
            </div>
            <button class="scroll-btn right" aria-label="다음 탭">&gt;</button>
        </nav>

        <main class="content-container">
            <h2 id="currentMallTitle" class="mall-title">쇼핑몰을 선택해주세요</h2>
            <div class="cards-grid" id="cardsGrid">
                <!-- Cards rendered dynamically -->
            </div>
            
            <div class="excluded-section">
                <h3 class="excluded-title">미추천 카드 목록</h3>
                <div class="excluded-cards-grid" id="excludedCardsGrid">
                    <!-- Excluded cards rendered dynamically -->
                </div>
            </div>
        </main>
    </div>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
